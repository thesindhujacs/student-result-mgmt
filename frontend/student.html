<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Results | BNMIT</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --navy: #0a0f2c; --accent: #e8a020; --white: #ffffff; --text: #c8d0e7; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f2f8; min-height: 100vh; }

    header {
      background: var(--navy); padding: 18px 36px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-row { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 38px; height: 38px; background: var(--accent);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--navy);
    }
    .logo-text strong { font-family: 'Syne', sans-serif; color: white; font-size: 14px; display: block; }
    .logo-text span   { font-size: 11px; color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-pill {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      color: var(--text); padding: 7px 14px; border-radius: 8px; font-size: 13px;
    }
    .user-pill strong { color: var(--accent); font-family: 'Syne', sans-serif; }
    .logout-btn {
      background: rgba(224,82,82,0.15); border: 1px solid rgba(224,82,82,0.2);
      color: #f08080; padding: 7px 16px; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .logout-btn:hover { background: rgba(224,82,82,0.25); }

    .container { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

    .welcome-card {
      background: var(--navy); border-radius: 16px;
      padding: 28px 32px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .welcome-card h2 {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: white;
    }
    .welcome-card span { font-size: 13px; color: var(--text); display: block; margin-top: 4px; }
    .usn-badge {
      background: var(--accent); color: var(--navy);
      padding: 8px 18px; border-radius: 20px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    }

    /* Result card */
    .result-card {
      background: white; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(10,15,44,0.07); overflow: hidden;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .result-header {
      background: var(--navy); padding: 28px 32px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .student-info strong {
      font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: white; display: block;
    }
    .student-info span { font-size: 13px; color: var(--text); }
    .result-meta { display: flex; gap: 20px; }
    .meta-item { text-align: center; }
    .meta-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--accent); display: block; }
    .meta-label { font-size: 11px; color: var(--text); text-transform: uppercase; letter-spacing: .05em; }

    .subjects-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px; padding: 28px 32px;
    }
    .subject-card {
      border: 1.5px solid #eef0f8; border-radius: 12px; padding: 18px 20px;
      transition: box-shadow 0.15s;
    }
    .subject-card:hover { box-shadow: 0 4px 16px rgba(10,15,44,0.08); }
    .subject-name { font-size: 13px; color: #888; margin-bottom: 8px; }
    .subject-marks { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--navy); line-height: 1; }
    .subject-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .out-of { font-size: 12px; color: #aaa; }

    .grade-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; font-family: 'Syne', sans-serif; }
    .grade-O  { background: #e6f4ea; color: #2e7d32; }
    .grade-Ap { background: #e8f0fe; color: #1a56db; }
    .grade-A  { background: #e8f0fe; color: #1a56db; }
    .grade-Bp { background: #fff8e1; color: #c77700; }
    .grade-B  { background: #fff8e1; color: #c77700; }
    .grade-C  { background: #fce8e6; color: #c62828; }
    .grade-F  { background: #f8d7da; color: #721c24; }

    .progress-bar-wrap { padding: 0 32px 28px; border-top: 1px solid #f0f2f8; }
    .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin: 16px 0 8px; }
    .progress-track { background: #f0f2f8; border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-fill  { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.8s ease; }

    .loading-msg { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
    .error-box { background: #fff0f0; border: 1px solid #fcc; border-radius: 10px; padding: 16px 20px; color: #c62828; font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">B</div>
    <div class="logo-text">
      <strong>BNMIT Portal</strong>
      <span>Student Results</span>
    </div>
  </div>
  <div class="header-right">
    <div class="user-pill">Logged in as <strong id="headerName">—</strong></div>
    <button class="logout-btn" onclick="logout()">⬅ Sign Out</button>
  </div>
</header>

<div class="container">
  <div class="welcome-card">
    <div>
      <h2 id="welcomeName">Welcome!</h2>
      <span>Academic Year 2025-26 · CSE Department · Semester 3</span>
    </div>
    <div class="usn-badge" id="usnBadge">—</div>
  </div>

  <div id="resultArea"><div class="loading-msg">Loading your results…</div></div>
</div>

<script>
  const API = '/api';

  // Security check — must be logged in as student
  const role = localStorage.getItem('role');
  const usn  = localStorage.getItem('usn');
  const name = localStorage.getItem('username');

  if (!role || !usn) {
    window.location.href = '/login';
  }

  // Show student info in header
  document.getElementById('headerName').textContent = name || usn;
  document.getElementById('welcomeName').textContent = 'Welcome, ' + (name || usn) + '!';
  document.getElementById('usnBadge').textContent = usn;

  function gradeClass(g) {
    return { 'O':'grade-O','A+':'grade-Ap','A':'grade-A','B+':'grade-Bp','B':'grade-B','C':'grade-C','F':'grade-F' }[g] || '';
  }

  async function fetchResults() {
    try {
      // Always use the logged-in student's own USN — cannot be changed
      const res  = await fetch(`${API}/results/${usn}`, { credentials: 'include' });
      const data = await res.json();

      if (!data.length) {
        document.getElementById('resultArea').innerHTML =
          '<div class="error-box">No results found for your USN. Please contact admin.</div>';
        return;
      }

      const total    = data.reduce((a, r) => a + r.marks_obtained, 0);
      const maxTotal = data.length * 100;
      const avg      = (total / data.length).toFixed(1);
      const pct      = Math.round(total / maxTotal * 100);

      document.getElementById('resultArea').innerHTML = `
        <div class="result-card">
          <div class="result-header">
            <div class="student-info">
              <strong>${data[0].name}</strong>
              <span>${usn} &nbsp;·&nbsp; CSE, Semester 3 &nbsp;·&nbsp; 2025-26</span>
            </div>
            <div class="result-meta">
              <div class="meta-item">
                <span class="meta-value">${total}</span>
                <span class="meta-label">Total / ${maxTotal}</span>
              </div>
              <div class="meta-item">
                <span class="meta-value">${avg}</span>
                <span class="meta-label">Average</span>
              </div>
              <div class="meta-item">
                <span class="meta-value">${pct}%</span>
                <span class="meta-label">Score</span>
              </div>
            </div>
          </div>

          <div class="subjects-grid">
            ${data.map(r => `
              <div class="subject-card">
                <div class="subject-name">${r.subject}</div>
                <div class="subject-marks">${r.marks_obtained}</div>
                <div class="subject-footer">
                  <span class="out-of">out of 100</span>
                  <span class="grade-badge ${gradeClass(r.grade)}">${r.grade}</span>
                </div>
              </div>`).join('')}
          </div>

          <div class="progress-bar-wrap">
            <div class="progress-label">
              <span>Overall Performance</span>
              <span>${pct}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="pBar" style="width:0%"></div>
            </div>
          </div>
        </div>`;

      setTimeout(() => { document.getElementById('pBar').style.width = pct + '%'; }, 100);

    } catch(e) {
      document.getElementById('resultArea').innerHTML =
        '<div class="error-box">Cannot connect to server. Make sure the backend is running.</div>';
    }
  }

  function logout() {
    fetch(`${API}/auth/logout`, { method: 'POST', credentials: 'include' });
    localStorage.clear();
    window.location.href = '/login';
  }

  // Auto-load results on page load
  fetchResults();
</script>
</body>
</html>
